name: 'logistics_dbt'
version: '1.0.0'
config-version: 2

profile: 'logistics_dbt'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  logistics_dbt:
    staging:
      +materialized: view
      +schema: logistics_staging
    intermediate:
      +materialized: table
      +schema: logistics_intermediate
    marts:
      +materialized: incremental
      +schema: logistics_marts
      +incremental_strategy: merge

vars:
  project_id: "gcp-real-time-logistics-cont"
  raw_dataset: "logistics_raw"
  raw_table: "telemetry_events"
